<script>// =============================================================
// MENACE Engine — Machine Educable Noughts and Crosses Engine
// Implements Michie's matchbox reinforcement learning system
// for Tic-Tac-Toe (Noughts and Crosses).
//
// MENACE plays as X (first mover). Each board state that MENACE
// encounters maps to a "matchbox" containing colored beads.
// Drawing a bead = choosing a move. After a game the beads are
// adjusted: wins add beads, draws add fewer, losses remove beads.
// =============================================================

(function () {
  'use strict';

  // ---- Constants ------------------------------------------------
  var EMPTY = 0, X = 1, O = 2;
  var WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],  // rows
    [0,3,6],[1,4,7],[2,5,8],  // cols
    [0,4,8],[2,4,6]            // diags
  ];

  // Bead reward/penalty settings (Michie's original values)
  var INITIAL_BEADS  = 8;   // beads per legal move in a fresh box
  var WIN_REWARD     = 3;   // beads added on win
  var DRAW_REWARD    = 1;   // beads added on draw
  var LOSS_PENALTY   = 1;   // beads removed on loss (min 1 remains)

  // ---- Board utilities ------------------------------------------

  function checkWinner(board) {
    for (var i = 0; i < WIN_LINES.length; i++) {
      var a = WIN_LINES[i][0], b = WIN_LINES[i][1], c = WIN_LINES[i][2];
      if (board[a] !== EMPTY && board[a] === board[b] && board[b] === board[c]) {
        return board[a]; // X or O
      }
    }
    return EMPTY;
  }

  function isDraw(board) {
    if (checkWinner(board) !== EMPTY) return false;
    for (var i = 0; i < 9; i++) {
      if (board[i] === EMPTY) return false;
    }
    return true;
  }

  function legalMoves(board) {
    var moves = [];
    for (var i = 0; i < 9; i++) {
      if (board[i] === EMPTY) moves.push(i);
    }
    return moves;
  }

  function boardKey(board) {
    return board.join('');
  }

  function copyBoard(board) {
    return board.slice();
  }

  // ---- Canonical rotation/reflection (state compression) --------
  // We map equivalent board positions to a single canonical key
  // so MENACE only needs ~304 matchboxes instead of ~5000+.

  var TRANSFORMS = [
    [0,1,2,3,4,5,6,7,8], // identity
    [2,5,8,1,4,7,0,3,6], // 90° CW
    [8,7,6,5,4,3,2,1,0], // 180°
    [6,3,0,7,4,1,8,5,2], // 270° CW
    [2,1,0,5,4,3,8,7,6], // horizontal flip
    [6,7,8,3,4,5,0,1,2], // vertical flip
    [0,3,6,1,4,7,2,5,8], // main diagonal
    [8,5,2,7,4,1,6,3,0]  // anti-diagonal
  ];

  function canonicalKey(board) {
    var best = boardKey(board);
    for (var t = 1; t < TRANSFORMS.length; t++) {
      var perm = TRANSFORMS[t];
      var key = '';
      for (var i = 0; i < 9; i++) key += board[perm[i]];
      if (key < best) best = key;
    }
    return best;
  }

  // Find the transform that maps canonical -> current orientation
  function findTransform(board) {
    var canon = canonicalKey(board);
    for (var t = 0; t < TRANSFORMS.length; t++) {
      var perm = TRANSFORMS[t];
      var key = '';
      for (var i = 0; i < 9; i++) key += board[perm[i]];
      if (key === canon) return perm;
    }
    return TRANSFORMS[0];
  }

  // Map a canonical-space cell index back to actual board index
  function invertTransform(perm, canonIdx) {
    for (var i = 0; i < 9; i++) {
      if (perm[i] === canonIdx) return i;
    }
    return canonIdx;
  }

  // ---- Move-orbit detection (symmetry within a single state) ----
  // Two legal moves are equivalent if a symmetry that *preserves*
  // the current board maps one to the other.  We group them into
  // orbits so that each orbit stores a single bead count.

  // Return the subset of TRANSFORMS that leave `board` unchanged.
  function getStabilizer(board) {
    var key = boardKey(board);
    var stab = [];
    for (var t = 0; t < TRANSFORMS.length; t++) {
      var perm = TRANSFORMS[t];
      var tKey = '';
      for (var i = 0; i < 9; i++) tKey += board[perm[i]];
      if (tKey === key) stab.push(perm);
    }
    return stab;
  }

  // Group the legal moves of `board` into equivalence classes
  // (orbits) under its stabilizer.  Returns an array of
  // { rep: <smallest index>, members: [idx, …] }.
  function getMoveOrbits(board) {
    var stabilizer = getStabilizer(board);
    var legal = legalMoves(board);
    var visited = {};
    var orbits = [];

    for (var i = 0; i < legal.length; i++) {
      var move = legal[i];
      if (visited[move]) continue;
      var orbitSet = {};
      for (var s = 0; s < stabilizer.length; s++) {
        var mapped = invertTransform(stabilizer[s], move);
        if (board[mapped] === EMPTY) orbitSet[mapped] = true;
      }
      var members = Object.keys(orbitSet).map(Number)
                          .sort(function (a, b) { return a - b; });
      for (var j = 0; j < members.length; j++) visited[members[j]] = true;
      orbits.push({ rep: members[0], members: members });
    }
    return orbits;
  }

  // ---- MENACE Agent ---------------------------------------------

  function MenaceAgent() {
    this.boxes = {};          // canonicalKey -> { _orbits, rep: beadCount }
    this.history = [];        // moves made this game: [{key, move}]
    this.stats = { wins: 0, draws: 0, losses: 0, games: 0 };
    this.gameLog = [];        // per-game outcomes for learning curve
  }

  MenaceAgent.prototype.getBox = function (board) {
    var key = canonicalKey(board);
    if (!this.boxes[key]) {
      // Compute canonical board and its move orbits
      var perm = findTransform(board);
      var canonBoard = [];
      for (var i = 0; i < 9; i++) canonBoard.push(board[perm[i]]);
      var orbits = getMoveOrbits(canonBoard);
      var box = { _orbits: orbits };
      for (var m = 0; m < orbits.length; m++) {
        box[orbits[m].rep] = INITIAL_BEADS;
      }
      this.boxes[key] = box;
    }
    return this.boxes[key];
  };

  MenaceAgent.prototype.chooseMove = function (board) {
    var key = canonicalKey(board);
    var box = this.getBox(board);
    var perm = findTransform(board);
    var orbits = box._orbits;

    // Total weighted beads = Σ(beads_per_orbit × orbit_size)
    var totalW = 0;
    for (var i = 0; i < orbits.length; i++) {
      totalW += (box[orbits[i].rep] || 0) * orbits[i].members.length;
    }

    if (totalW === 0) {
      var legal = legalMoves(board);
      var actualMove = legal[Math.floor(Math.random() * legal.length)];
      this.history.push({ key: key, move: null });
      return actualMove;
    }

    // Weighted random selection of orbit
    var r = Math.random() * totalW;
    var cumul = 0;
    var chosenOrbit = orbits[0];
    for (var i = 0; i < orbits.length; i++) {
      cumul += (box[orbits[i].rep] || 0) * orbits[i].members.length;
      if (r < cumul) { chosenOrbit = orbits[i]; break; }
    }

    // Pick a random member of the chosen orbit
    var canonMove = chosenOrbit.members[
      Math.floor(Math.random() * chosenOrbit.members.length)
    ];
    var actualMove = invertTransform(perm, canonMove);

    // Record the orbit representative for reward
    this.history.push({ key: key, move: chosenOrbit.rep });
    return actualMove;
  };

  MenaceAgent.prototype.reward = function (outcome) {
    // outcome: 'win', 'draw', 'loss'
    var delta = outcome === 'win' ? WIN_REWARD
              : outcome === 'draw' ? DRAW_REWARD
              : -LOSS_PENALTY;

    for (var i = 0; i < this.history.length; i++) {
      var h = this.history[i];
      if (h.move === null) continue;
      var box = this.boxes[h.key];
      if (!box) continue;
      box[h.move] = Math.max(1, (box[h.move] || 0) + delta);
    }

    this.stats.games++;
    if (outcome === 'win')  this.stats.wins++;
    if (outcome === 'draw') this.stats.draws++;
    if (outcome === 'loss') this.stats.losses++;
    this.gameLog.push(outcome);

    this.history = [];
  };

  MenaceAgent.prototype.reset = function () {
    this.boxes = {};
    this.history = [];
    this.stats = { wins: 0, draws: 0, losses: 0, games: 0 };
    this.gameLog = [];
  };

  MenaceAgent.prototype.getBeadSnapshot = function (board) {
    // Return bead counts mapped to actual board positions.
    // All cells in the same orbit get the same bead count.
    var box = this.getBox(board);
    var perm = findTransform(board);
    var orbits = box._orbits;
    var result = [];
    for (var i = 0; i < 9; i++) result.push(0);

    for (var o = 0; o < orbits.length; o++) {
      var beads = box[orbits[o].rep] || 0;
      var members = orbits[o].members;
      for (var m = 0; m < members.length; m++) {
        var actualIdx = invertTransform(perm, members[m]);
        result[actualIdx] = beads;
      }
    }
    return result;
  };

  MenaceAgent.prototype.totalBeads = function (board) {
    var snap = this.getBeadSnapshot(board);
    var sum = 0;
    for (var i = 0; i < 9; i++) sum += snap[i];
    return sum;
  };

  // ---- Random opponent ------------------------------------------

  function randomMove(board) {
    var legal = legalMoves(board);
    return legal[Math.floor(Math.random() * legal.length)];
  }

  // ---- Play one full game (MENACE = X vs random/human O) --------

  function playGame(menace, opponentMoveFn) {
    var board = [0,0,0,0,0,0,0,0,0];
    var moveRecord = [];

    while (true) {
      // MENACE (X) moves
      var xMove = menace.chooseMove(board);
      board[xMove] = X;
      moveRecord.push({ player: X, cell: xMove, board: copyBoard(board) });
      if (checkWinner(board) === X) {
        menace.reward('win');
        return { outcome: 'win', moves: moveRecord };
      }
      if (isDraw(board)) {
        menace.reward('draw');
        return { outcome: 'draw', moves: moveRecord };
      }

      // Opponent (O) moves
      var oMove = opponentMoveFn(board);
      board[oMove] = O;
      moveRecord.push({ player: O, cell: oMove, board: copyBoard(board) });
      if (checkWinner(board) === O) {
        menace.reward('loss');
        return { outcome: 'loss', moves: moveRecord };
      }
      if (isDraw(board)) {
        menace.reward('draw');
        return { outcome: 'draw', moves: moveRecord };
      }
    }
  }

  // ---- Batch training -------------------------------------------

  function trainBatch(menace, numGames) {
    var results = [];
    for (var i = 0; i < numGames; i++) {
      var r = playGame(menace, randomMove);
      results.push(r.outcome);
    }
    return results;
  }

  // ---- Rolling statistics for learning curve --------------------

  function rollingStats(gameLog, windowSize) {
    windowSize = windowSize || 20;
    var wins = [], draws = [], losses = [], x = [];
    var wCount = 0, dCount = 0, lCount = 0;

    for (var i = 0; i < gameLog.length; i++) {
      if (gameLog[i] === 'win')  wCount++;
      if (gameLog[i] === 'draw') dCount++;
      if (gameLog[i] === 'loss') lCount++;

      if (i >= windowSize) {
        if (gameLog[i - windowSize] === 'win')  wCount--;
        if (gameLog[i - windowSize] === 'draw') dCount--;
        if (gameLog[i - windowSize] === 'loss') lCount--;
      }

      var n = Math.min(i + 1, windowSize);
      x.push(i + 1);
      wins.push((wCount / n) * 100);
      draws.push((dCount / n) * 100);
      losses.push((lCount / n) * 100);
    }
    return { x: x, wins: wins, draws: draws, losses: losses };
  }

  // ---- Export to window -----------------------------------------

  window.MENACE = {
    EMPTY: EMPTY, X: X, O: O,
    WIN_LINES: WIN_LINES,
    checkWinner: checkWinner,
    isDraw: isDraw,
    legalMoves: legalMoves,
    copyBoard: copyBoard,
    canonicalKey: canonicalKey,
    MenaceAgent: MenaceAgent,
    randomMove: randomMove,
    playGame: playGame,
    trainBatch: trainBatch,
    rollingStats: rollingStats,
    INITIAL_BEADS: INITIAL_BEADS,
    WIN_REWARD: WIN_REWARD,
    DRAW_REWARD: DRAW_REWARD,
    LOSS_PENALTY: LOSS_PENALTY
  };

})();</script>

<script>// =============================================================
// MENACE Visualisation — Interactive tic-tac-toe board,
// matchbox bead display, and Plotly learning curve.
// Uses window.INFERNO for colors and window.MENACE for engine.
// =============================================================

(function () {
  'use strict';

  var M = window.MENACE;
  var R = window.INFERNO.roles;

  // ---- Bead color per cell position (9 Inferno stops) -----------
  var BEAD_COLORS = [];
  (function () {
    for (var i = 0; i < 9; i++) {
      BEAD_COLORS.push(window.INFERNO.at(i / 8));
    }
  })();

  // ---- Shared state ---------------------------------------------
  var menace = new M.MenaceAgent();
  var currentBoard  = [0,0,0,0,0,0,0,0,0];
  var gameActive    = false;
  var humanTurn     = false;
  var autoTraining  = false;

  // The board MENACE was looking at when it last made a decision.
  // This is what the matchbox display shows — NOT currentBoard,
  // because currentBoard is usually a state where it's the human's
  // turn and MENACE has no matchbox for it.
  var menaceViewBoard = null;
  var menaceChosenCell = -1;   // actual cell MENACE placed X on

  // ---- DOM helpers ----------------------------------------------

  function el(id) { return document.getElementById(id); }

  function setText(id, text) {
    var e = el(id);
    if (e) e.textContent = text;
  }

  // ---- Board rendering (canvas based) ---------------------------
  var CELL_SIZE  = 80;
  var BOARD_SIZE = CELL_SIZE * 3;

  function getCanvas() { return el('menace-board'); }
  function getCtx()    { var c = getCanvas(); return c ? c.getContext('2d') : null; }

  function drawBoard() {
    var ctx = getCtx();
    if (!ctx) return;
    var cs = CELL_SIZE;
    ctx.clearRect(0, 0, BOARD_SIZE, BOARD_SIZE);

    // Grid lines
    ctx.strokeStyle = '#420a68';
    ctx.lineWidth = 3;
    for (var i = 1; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(i * cs, 0); ctx.lineTo(i * cs, BOARD_SIZE); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * cs); ctx.lineTo(BOARD_SIZE, i * cs); ctx.stroke();
    }

    // Pieces
    for (var r = 0; r < 3; r++) {
      for (var c = 0; c < 3; c++) {
        var idx = r * 3 + c;
        var cx = c * cs + cs / 2;
        var cy = r * cs + cs / 2;
        if (currentBoard[idx] === M.X) drawX(ctx, cx, cy, cs);
        else if (currentBoard[idx] === M.O) drawO(ctx, cx, cy, cs);
      }
    }

    // Winning line
    var winner = M.checkWinner(currentBoard);
    if (winner !== M.EMPTY) {
      for (var w = 0; w < M.WIN_LINES.length; w++) {
        var line = M.WIN_LINES[w];
        if (currentBoard[line[0]] === winner &&
            currentBoard[line[1]] === winner &&
            currentBoard[line[2]] === winner) {
          drawWinLine(ctx, line, cs);
          break;
        }
      }
    }
  }

  function drawX(ctx, cx, cy, cs) {
    var off = cs * 0.28;
    ctx.strokeStyle = R.lineA;
    ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx - off, cy - off); ctx.lineTo(cx + off, cy + off); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + off, cy - off); ctx.lineTo(cx - off, cy + off); ctx.stroke();
  }

  function drawO(ctx, cx, cy, cs) {
    var rad = cs * 0.28;
    ctx.strokeStyle = R.lineB;
    ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(cx, cy, rad, 0, 2 * Math.PI); ctx.stroke();
  }

  function drawWinLine(ctx, line, cs) {
    var r0 = Math.floor(line[0] / 3), c0 = line[0] % 3;
    var r2 = Math.floor(line[2] / 3), c2 = line[2] % 3;
    ctx.strokeStyle = '#fca50a';
    ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(c0 * cs + cs / 2, r0 * cs + cs / 2);
    ctx.lineTo(c2 * cs + cs / 2, r2 * cs + cs / 2);
    ctx.stroke();
    ctx.globalAlpha = 1.0;
  }

  // ---- Bead dot rendering ---------------------------------------
  // Render `count` small colored circles inside a flex container.
  // Above MAX_DOTS we show dots + "+N" overflow label.
  var MAX_DOTS = 16;
  var DOT_SIZE = 7;   // px

  function renderBeadDots(count, color) {
    var show = Math.min(count, MAX_DOTS);
    var html = '<div style="display:flex; flex-wrap:wrap; gap:2px; justify-content:center; padding:2px;">';
    for (var i = 0; i < show; i++) {
      html += '<span style="display:inline-block; width:' + DOT_SIZE + 'px; height:' + DOT_SIZE + 'px; ' +
              'border-radius:50%; background:' + color + ';"></span>';
    }
    if (count > MAX_DOTS) {
      html += '<span style="font-size:9px; color:' + color + '; align-self:center;">+' + (count - MAX_DOTS) + '</span>';
    }
    html += '</div>';
    return html;
  }

  // ---- Matchbox bead visualisation ------------------------------
  // Shows the matchbox for `menaceViewBoard` (the state MENACE
  // was evaluating), NOT currentBoard.

  function renderMatchbox() {
    var container = el('menace-matchbox');
    if (!container) return;

    if (!menaceViewBoard) {
      container.innerHTML = '<div style="color:#888; text-align:center; padding:30px;">' +
        'Start a game to see MENACE\'s matchbox</div>';
      return;
    }

    var viewBoard = menaceViewBoard;
    var beads = menace.getBeadSnapshot(viewBoard);
    var total = 0;
    for (var i = 0; i < 9; i++) total += beads[i];

    var html = '<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:4px; max-width:280px; margin:0 auto;">';
    for (var i = 0; i < 9; i++) {
      var count   = beads[i];
      var isLegal = viewBoard[i] === M.EMPTY;
      var isChosen = (i === menaceChosenCell);
      var pct = total > 0 && isLegal ? ((count / total) * 100).toFixed(0) : 0;
      var color = BEAD_COLORS[i];

      var bgColor, border;
      if (!isLegal) {
        // Occupied cell — show X or O
        bgColor = '#f5f5f5';
        border  = '1px solid #ddd';
      } else if (isChosen) {
        // The move MENACE picked — highlight border
        bgColor = 'rgba(252, 165, 10, 0.15)';
        border  = '3px solid #fca50a';
      } else {
        bgColor = 'rgba(255,255,255,0.6)';
        border  = '2px solid ' + window.INFERNO.rgba(color, 0.4);
      }

      html += '<div style="' +
        'background:' + bgColor + ';' +
        'border:' + border + ';' +
        'border-radius:8px;' +
        'padding:6px 4px;' +
        'text-align:center;' +
        'min-height:60px;' +
        'display:flex; flex-direction:column; justify-content:center; align-items:center;' +
        '">';

      if (viewBoard[i] === M.X) {
        html += '<span style="font-size:22px; color:' + R.lineA + ';">✕</span>';
      } else if (viewBoard[i] === M.O) {
        html += '<span style="font-size:22px; color:' + R.lineB + ';">○</span>';
      } else {
        html += renderBeadDots(count, color);
        html += '<div style="font-size:10px; color:#888; margin-top:2px;">' + pct + '%</div>';
      }
      html += '</div>';
    }
    html += '</div>';

    if (total > 0) {
      html += '<div style="text-align:center; margin-top:8px; font-size:12px; color:#666;">Total beads: ' + total + '</div>';
    }

    container.innerHTML = html;
  }

  // ---- Learning curve (Plotly) ----------------------------------

  function renderLearningCurve() {
    var div = el('menace-curve');
    if (!div) return;

    if (menace.gameLog.length < 2) {
      Plotly.purge(div);
      return;
    }

    var windowSize = Math.min(50, Math.max(5, Math.floor(menace.gameLog.length / 4)));
    var s = M.rollingStats(menace.gameLog, windowSize);

    var traces = [
      { x: s.x, y: s.wins, mode: 'lines', name: 'Win %',
        line: { color: R.lineA, width: 2 },
        hovertemplate: 'Game %{x}<br>Win: %{y:.1f}%<extra></extra>' },
      { x: s.x, y: s.draws, mode: 'lines', name: 'Draw %',
        line: { color: '#fca50a', width: 2 },
        hovertemplate: 'Game %{x}<br>Draw: %{y:.1f}%<extra></extra>' },
      { x: s.x, y: s.losses, mode: 'lines', name: 'Loss %',
        line: { color: R.lineB, width: 2 },
        hovertemplate: 'Game %{x}<br>Loss: %{y:.1f}%<extra></extra>' }
    ];

    var layout = {
      xaxis: { title: 'Game #' },
      yaxis: { title: 'Rate (%)', range: [0, 105] },
      plot_bgcolor: 'white', paper_bgcolor: 'white',
      margin: { l: 50, r: 20, t: 10, b: 45 },
      legend: { x: 0.01, y: 0.99, bgcolor: 'rgba(255,255,255,0.8)' },
      showlegend: true,
      annotations: [{
        x: 0.5, y: 1.05, xref: 'paper', yref: 'paper',
        text: 'Rolling ' + windowSize + '-game average',
        showarrow: false, font: { size: 11, color: '#888' }
      }]
    };

    Plotly.react(div, traces, layout, { responsive: true, displayModeBar: false });
  }

  // ---- Stats display --------------------------------------------

  function renderStats() {
    var s = menace.stats;
    if (s.games === 0) {
      setText('menace-stats', 'No games played yet.');
      return;
    }
    var wPct = ((s.wins / s.games) * 100).toFixed(1);
    var dPct = ((s.draws / s.games) * 100).toFixed(1);
    var lPct = ((s.losses / s.games) * 100).toFixed(1);
    var boxes = Object.keys(menace.boxes).length;

    setText('menace-stats',
      'Games: ' + s.games +
      ' | W: ' + s.wins + ' (' + wPct + '%)' +
      ' | D: ' + s.draws + ' (' + dPct + '%)' +
      ' | L: ' + s.losses + ' (' + lPct + '%)' +
      ' | Matchboxes: ' + boxes
    );
  }

  // ---- Game logic -----------------------------------------------

  function newGame() {
    currentBoard = [0,0,0,0,0,0,0,0,0];
    gameActive   = true;
    humanTurn    = false;
    menaceChosenCell = -1;

    // Show the empty-board matchbox — this is where learning is visible
    menaceViewBoard = M.copyBoard(currentBoard);
    setText('menace-status', 'MENACE is thinking...');
    drawBoard();
    renderMatchbox();

    // MENACE moves first (X) after a brief pause so user can see the matchbox
    setTimeout(function () { menaceMoves(); }, 600);
  }

  function menaceMoves() {
    if (!gameActive) return;

    // Snapshot the board BEFORE MENACE's move — this is the matchbox state
    menaceViewBoard = M.copyBoard(currentBoard);

    var move = menace.chooseMove(currentBoard);
    currentBoard[move] = M.X;
    menaceChosenCell = move;

    drawBoard();
    renderMatchbox();   // shows menaceViewBoard + highlights chosen cell

    var winner = M.checkWinner(currentBoard);
    if (winner === M.X) { endGame('win'); return; }
    if (M.isDraw(currentBoard)) { endGame('draw'); return; }

    humanTurn = true;
    setText('menace-status', 'Your turn (O). Click a cell.');
  }

  function humanMoves(cell) {
    if (!gameActive || !humanTurn) return;
    if (currentBoard[cell] !== M.EMPTY) return;

    currentBoard[cell] = M.O;
    humanTurn = false;
    drawBoard();

    var winner = M.checkWinner(currentBoard);
    if (winner === M.O) { endGame('loss'); return; }
    if (M.isDraw(currentBoard)) { endGame('draw'); return; }

    setText('menace-status', 'MENACE is thinking...');
    setTimeout(function () { menaceMoves(); }, 300);
  }

  function endGame(outcome) {
    gameActive = false;
    humanTurn  = false;
    menace.reward(outcome);
    drawBoard();
    renderMatchbox();
    renderStats();
    renderLearningCurve();

    var msg = outcome === 'win'  ? 'MENACE wins!'
            : outcome === 'draw' ? 'Draw!'
            : 'You win! MENACE loses.';
    setText('menace-status', msg + ' Click "New Game" to play again.');
  }

  // ---- Training -------------------------------------------------

  function trainN(n) {
    if (autoTraining) return;
    autoTraining = true;
    gameActive = false;
    humanTurn  = false;
    setText('menace-status', 'Training ' + n + ' games...');

    var batchSize = 50;
    var done = 0;

    function runBatch() {
      var toRun = Math.min(batchSize, n - done);
      M.trainBatch(menace, toRun);
      done += toRun;
      renderStats();
      renderLearningCurve();

      if (done < n) {
        setText('menace-status', 'Training... ' + done + '/' + n);
        setTimeout(runBatch, 10);
      } else {
        autoTraining = false;
        // After training, show empty-board matchbox so user sees the learned weights
        menaceViewBoard  = [0,0,0,0,0,0,0,0,0];
        menaceChosenCell = -1;
        renderMatchbox();
        setText('menace-status', 'Training complete! ' + n + ' games played. Click "New Game" to test MENACE.');
      }
    }
    runBatch();
  }

  function resetMenace() {
    menace.reset();
    currentBoard    = [0,0,0,0,0,0,0,0,0];
    menaceViewBoard = null;
    menaceChosenCell = -1;
    gameActive = false;
    humanTurn  = false;
    drawBoard();
    renderMatchbox();
    renderStats();
    renderLearningCurve();
    setText('menace-status', 'MENACE reset. All matchboxes cleared.');
  }

  // ---- Matchbox Collection (Wikipedia-style visual) -------------
  // Enumerates ALL canonical board states where it's MENACE's turn,
  // groups them by move number, and renders colored blocks.

  var COLLECTION_COLORS = [
    { bg: '#c8e6c9', border: '#66bb6a' },   // green  — move 1
    { bg: '#bbdefb', border: '#42a5f5' },   // blue   — move 2
    { bg: '#f5f5f5', border: '#9e9e9e' },   // white  — move 3
    { bg: '#f8bbd0', border: '#ec407a' },   // pink   — move 4
    { bg: '#ef9a9a', border: '#ef5350' }    // red    — move 5
  ];

  function enumerateMatchboxStates() {
    var groups = {};
    for (var m = 1; m <= 5; m++) groups[m] = {};

    var board = [0,0,0,0,0,0,0,0,0];

    function recurse(xCount, oCount) {
      if (M.checkWinner(board) !== M.EMPTY) return;

      var isXTurn = (xCount === oCount);

      if (isXTurn) {
        var move = xCount + 1;
        if (move <= 5) groups[move][M.canonicalKey(board)] = true;
      }

      if (xCount + oCount >= 9) return;

      var player = isXTurn ? M.X : M.O;
      for (var i = 0; i < 9; i++) {
        if (board[i] !== M.EMPTY) continue;
        board[i] = player;
        recurse(isXTurn ? xCount + 1 : xCount, isXTurn ? oCount : oCount + 1);
        board[i] = M.EMPTY;
      }
    }

    recurse(0, 0);
    return groups;
  }

  function renderMatchboxCollection() {
    var container = el('menace-collection');
    if (!container) return;

    var groups = enumerateMatchboxStates();
    var total = 0;

    // Faint tic-tac-toe grid pattern drawn on each matchbox via CSS gradients
    var gridCSS =
      'linear-gradient(to right, ' +
        'transparent 30%, rgba(0,0,0,0.13) 30%, rgba(0,0,0,0.13) 34%, transparent 34%, ' +
        'transparent 64%, rgba(0,0,0,0.13) 64%, rgba(0,0,0,0.13) 68%, transparent 68%), ' +
      'linear-gradient(to bottom, ' +
        'transparent 28%, rgba(0,0,0,0.13) 28%, rgba(0,0,0,0.13) 34%, transparent 34%, ' +
        'transparent 63%, rgba(0,0,0,0.13) 63%, rgba(0,0,0,0.13) 69%, transparent 69%)';

    var html = '<div style="display:flex; gap:24px; align-items:flex-end; ' +
               'flex-wrap:wrap; justify-content:center; padding:8px 0;">';

    for (var m = 1; m <= 5; m++) {
      var keys = Object.keys(groups[m]);
      var count = keys.length;
      if (count === 0) continue;
      total += count;

      var col = COLLECTION_COLORS[m - 1];
      var boxesPerRow = Math.max(4, Math.min(14, Math.ceil(Math.sqrt(count * 2))));
      var maxW = boxesPerRow * 25;

      html += '<div style="text-align:center;">';
      html += '<div style="display:flex; flex-wrap:wrap; gap:2px; ' +
              'max-width:' + maxW + 'px; justify-content:center;">';

      for (var i = 0; i < count; i++) {
        html += '<div style="' +
          'width:22px; height:15px;' +
          'background-image:' + gridCSS + ';' +
          'background-color:' + col.bg + ';' +
          'border:1px solid ' + col.border + ';' +
          'border-radius:2px;' +
          'box-shadow:1px 1px 2px rgba(0,0,0,0.08);' +
        '"></div>';
      }

      html += '</div>';
      var gameTurn = (m - 1) * 2 + 1;
      html += '<div style="font-size:11px; color:#555; margin-top:8px; font-weight:600;">' +
              'Move ' + m + '</div>';
      html += '<div style="font-size:10px; color:#999;">' +
              count + ' matchbox' + (count > 1 ? 'es' : '') + '</div>';
      html += '<div style="font-size:9px; color:#bbb;">(turn ' + gameTurn + ')</div>';
      html += '</div>';
    }

    html += '</div>';
    html += '<div style="text-align:center; font-size:12px; color:#888; margin-top:10px;">' +
            'Total: ' + total + ' matchboxes</div>';

    container.innerHTML = html;
  }

  // ---- Canvas click handler -------------------------------------

  function onBoardClick(e) {
    var canvas = getCanvas();
    if (!canvas) return;
    var rect = canvas.getBoundingClientRect();
    var x = (e.clientX - rect.left) * (canvas.width / rect.width);
    var y = (e.clientY - rect.top)  * (canvas.height / rect.height);
    var col = Math.floor(x / CELL_SIZE);
    var row = Math.floor(y / CELL_SIZE);
    if (col >= 0 && col < 3 && row >= 0 && row < 3) {
      humanMoves(row * 3 + col);
    }
  }

  // ---- Initialisation -------------------------------------------

  function initMenace() {
    var canvas = getCanvas();
    if (canvas) {
      canvas.width  = BOARD_SIZE;
      canvas.height = BOARD_SIZE;
      canvas.addEventListener('click', onBoardClick);
      canvas.style.cursor = 'pointer';
    }

    var btnNew   = el('menace-btn-new');
    var btnReset = el('menace-btn-reset');
    var btn50    = el('menace-btn-train50');
    var btn200   = el('menace-btn-train200');
    var btn500   = el('menace-btn-train500');

    if (btnNew)   btnNew.addEventListener('click', newGame);
    if (btnReset) btnReset.addEventListener('click', resetMenace);
    if (btn50)    btn50.addEventListener('click', function () { trainN(50); });
    if (btn200)   btn200.addEventListener('click', function () { trainN(200); });
    if (btn500)   btn500.addEventListener('click', function () { trainN(500); });

    drawBoard();
    renderMatchbox();
    renderStats();
    renderMatchboxCollection();
    setText('menace-status', 'Click "New Game" to play against MENACE, or train it first.');
  }

  window.initMenacePlot = initMenace;

})();
document.addEventListener('DOMContentLoaded', function() { initMenacePlot(); });</script>

<script>

    const title = encodeURIComponent(document.title);

    window.open(`https://twitter.com/intent/tweet?url=${url}&text=${title}`, '_blank', 'width=600,height=400');

  }

  

  function shareOnLinkedIn() {

    const url = encodeURIComponent(window.location.href);

  function shareOnFacebook() {

    const url = encodeURIComponent(window.location.href);

    window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank', 'width=600,height=400');

  }

  

  function shareViaEmail() {

    const url = encodeURIComponent(window.location.href);

    const title = encodeURIComponent(document.title);

    const body = encodeURIComponent(`I thought you might find this interesting: ${window.location.href}`);

    window.location.href = `mailto:?subject=${title}&body=${body}`;

  }

  

  function copyLink(button) {

    navigator.clipboard.writeText(window.location.href).then(function() {

      // Change button text to show success

      const textSpan = button.querySelector('.copy-text');

      const originalText = textSpan.textContent;

      textSpan.textContent = 'Copied!';

      button.classList.add('copied');

      

      // Reset after 2 seconds

      setTimeout(function() {

        textSpan.textContent = originalText;

        button.classList.remove('copied');

      }, 2000);

    }).catch(function(err) {

      console.error('Failed to copy link: ', err);

      alert('Failed to copy link. Please copy it manually from the address bar.');

    });

  }
