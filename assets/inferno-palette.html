<script>
// =============================================================
// Viridis Inferno Palette — Global Color System
// Available on every page via window.INFERNO
// =============================================================
window.INFERNO = {
  // 11 discrete stops sampled from viridis inferno (0.0 → 1.0)
  palette: [
    '#000004', '#1b0c41', '#420a68', '#6a176e', '#932667',
    '#bb3754', '#dd513a', '#f37819', '#fca50a', '#f6d746', '#fcffa4'
  ],

  // Role-based colors — identical across every plot for consistency
  // "trace A" = the function line + shaded area
  // "trace B" = the integral bar (right panel)
  roles: {
    lineA:       '#932667',                    // function curve
    fillA:       'rgba(147, 38, 103, 0.25)',   // shaded area under curve
    fillBorderA: 'rgba(147, 38, 103, 0.70)',   // border of shaded area
    lineB:       '#dd513a',                    // second trace / bar
    fillB:       'rgba(221, 81, 58, 0.50)',    // bar fill
    markerLower: '#fca50a',                    // lower-limit marker (amber)
    markerUpper: '#420a68',                    // upper-limit marker (deep purple)
    annotation:  '#2c3e50',                    // flatly banner blue — dashed lines, labels
    panelBg:     'rgba(147, 38, 103, 0.04)'    // subtle control-panel tint
  },

  // Utility: get hex color at position t ∈ [0, 1] (for continuous scales)
  at: function(t) {
    var idx = Math.max(0, Math.min(1, t)) * (this.palette.length - 1);
    return this.palette[Math.round(idx)];
  },

  // Utility: hex → rgba string
  rgba: function(hex, alpha) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
  },

  // Plotly-compatible colorscale for continuous variables
  colorscale: [
    [0.0, '#000004'], [0.1, '#1b0c41'], [0.2, '#420a68'],
    [0.3, '#6a176e'], [0.4, '#932667'], [0.5, '#bb3754'],
    [0.6, '#dd513a'], [0.7, '#f37819'], [0.8, '#fca50a'],
    [0.9, '#f6d746'], [1.0, '#fcffa4']
  ]
};
</script>

<style>
/* noUiSlider inferno theming — single solid color */
.noUi-connect {
  background: #932667 !important;
}
.noUi-handle {
  border-color: #6a176e !important;
  box-shadow: 0 0 4px rgba(0, 0, 4, 0.25) !important;
}
</style>
